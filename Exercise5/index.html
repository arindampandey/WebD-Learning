<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multicolor Website</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    </style>
    <style>
        :root {
            --primary-color: rgba(174, 143, 203, 0.854);
            --text-color: rgba(252, 250, 255, 0.908);
            --secondry-color: rgb(246, 236, 255);
        }

        body {
            background-color: rgb(221, 203, 236);
            /* height: 1000px; */
        }

        * {
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: var(--primary-color);
            padding: 12px;
            position: sticky;
            top: 0;
        }

        ul li {
            list-style: none;
            display: inline;
            padding: 100px;
            font-family: "Poppins", sans-serif;
            font-weight: 200;
            font-style: normal;
            color: var(--text-color);
        }

        .box {
            border: 1px solid black;
            background-color: rgba(236, 216, 254, 0.854);
            height: 40vw;
            margin: 4px;
            padding: 4px;
            display: flex;
        }

        .box1 {
            border: 1px solid black;
            background-color: rgb(216, 172, 255);
            height: 350px;
            width: 350px;
            margin-top: 55px;
            margin-left: 100px;
            text-align: center;
            font-family: "Poppins", sans-serif;
            font-weight: 200;
            font-style: normal;
        }

        .box1:hover {
            background-color: rgb(244, 214, 255);
        }

        .box2 {
            border: 1px solid black;
            background-color: rgb(216, 172, 255);
            height: 350px;
            width: 350px;
            margin-top: 55px;
            margin-left: 250px;
            text-align: center;
            font-family: "Poppins", sans-serif;
            font-weight: 200;
            font-style: normal;
        }

        .box2:hover {
            background-color: rgb(244, 214, 255);
        }

        .capsule {
            border: 1px solid black;
            border-radius: 20px;
            height: 100px;
            text-align: center;
            font-family: "Poppins", sans-serif;
            font-weight: 200;
            font-style: normal;
            margin-top: 10px;
            margin-left: 100px;
            margin-right: 100px;
            background-color: var(--primary-color);
        }

        .capsule:hover {
            background-color: rgb(244, 214, 255);
        }

        .footer {
            border: 0px solid white;
            background-color: var(--primary-color);
            height: 45px;
            margin-top: 300px;
            margin-bottom: 0px;
            padding-bottom: 0px;
        }

        img {
            height: 50px;
            width: 50px;
            border: 4px solid var(--primary-color);
            border-radius: 40px;
            margin-left: 1100px;
            margin-top: 8vh;
            position: fixed;
        }
    </style>
</head>

<body>
    <div>
        <nav>
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Sevices</li>
                <li>Cantact</li>
            </ul>
        </nav>
    <div class="box">
        <div class="box1">
            <p style="margin-top: 150px;">Build Together !!</p>
        </div>
        <div class="box2">
            <p style="margin-top: 150px;">Grow Together !!</p>
        </div>
    </div>

    <span>
        <img src="https://imgs.search.brave.com/Ftk2E1ASEBfr30l7WcrsWgU0yvM6zs1Y02RZchL5QLg/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9yZXMu/Y2xvdWRpbmFyeS5j/b20vdmlzdGFwcmlu/dC9pbWFnZXMvd180/NjAsaF80NTksY19z/Y2FsZS9mX2F1dG8s/cV9hdXRvL3YxNzA2/MTkzNTE4L2lkZWFz/LWFuZC1hZHZpY2Ut/cHJvZC9ibG9nYWRt/aW4vYXR0YWNobWVu/dF85MTI3NjQ1Ni1l/MTUxNTU5Mzk4NDg2/Ny9hdHRhY2htZW50/XzkxMjc2NDU2LWUx/NTE1NTkzOTg0ODY3/LmpwZz9faT1BQQ"
            alt="">

    <div class="capsule">
        <p style="margin-top: 35px;">Hellooo......Welcome to my Website !!</p>
    </div>

    <div class="footer">
    </div>

</div>

</body>

</html>
