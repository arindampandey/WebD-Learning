<!-- Images , Tables and Lists  -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img width="230" height="300" src="img.png" alt="My Image">
    <!-- alt shows the error when the image is not available -->

    <!-- To get a new line -->
    <br>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Fav Car</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Arindam</td>
                <td>19</td>
                <td rowspan="2">911 Carrera</td>
            </tr>
            <tr>
                <td rowspan="2">Sam</td>
                <td rowspan="2">20</td>
            </tr>

        </tbody>

    </table>

    <ul>
        <li>Arindam</li>
        <li>Rohan</li>
        <li>Ram</li>
        <li>Shyam</li>
    </ul>

    <ul type="square">
        <li>Arindam</li>
        <li>Rohan</li>
        <li>Ram</li>
        <li>Shyam</li>
    </ul>

    <ol>
        <li>Arindam</li>
        <li>Rohan</li>
        <li>Ram</li>
        <li>Shyam</li>
    </ol>
    <ol type="A">
        <li>Arindam</li>
        <li>Rohan</li>
        <li>Ram</li>
        <li>Shyam</li>
    </ol>
    <ol type="I">
        <li>Arindam</li>
        <li>Rohan</li>
        <li>Ram</li>
        <li>Shyam</li>
    </ol>
</body>

</html>
