<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        .box {
            border: 2px solid black;
            height: 433px;
            width: 80vw;
            padding: 3px;
            margin: 3px;
        }

        .box1 {
            background-color: antiquewhite;
            position: sticky;
            top: 0px;
            /* position: relative;
            top: 45px;
            left: 50px; */
        }

        .box2 {
            background-color: aqua;
            /* position: absolute;  (Absolute position finds its nearest postioned parent to settel | NOTE:- Transform , filter or perspective properties can also make an element appear as positioned. ) */
            /* top: 0px;
            left: 3px; */
        }

        .box3 {
            background-color: blueviolet;
            /* position: fixed;
            top: 0px;
            right: 20vw; */
        }

        .box4 {
            background-color: coral;
        }

        .parent {
            padding: 43px;
            margin: 34px;
            border: 2px solid red;
            /* position: absolute; */
            /* transform: translate(0); */
            filter: invert(0);
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box1 box"></div>
        <div class="box2 box"></div>
        <div class="box3 box"></div>
        <div class="box4 box"></div>
    </div>
</body>

</html>
