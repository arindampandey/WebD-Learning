<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* Element Selector */
        div {
            /* background-color: red; */
        }

        /* Class Selectors */
        .red {
            background-color: red;
        }

        /* ID Selectors */
        #green {
            background-color: green;
        }

        /* Child Selectors */
        div>p {
            color: black;
            background-color: antiquewhite;
            /* Works only when direct child  */
        }

        /* Descendent Selector  */
        div p {
            color: black;
            background-color: antiquewhite;
        }

        /* Universal Selector */
        *{
            margin: 0;
            padding: 0;
            /* Used to fill the gap in left and top  */
        }

        /* Pseudo Selector */
        a:visited{
            color: greenyellow;
        }
        a:link{
            color: red;
        }
        a:active{
            background-color: yellow;
        }
        a:hover{
            background-color: mistyrose;
        }
        p:first-child{
            background-color: rgb(145, 234, 244);
        }

    </style>
</head>

<body>
    <main>
        <p>I am first</p>
        <p>I am second</p> 
    </main>

    <div class="red">
        I am div
        <span>
            <p>I am a para inside div</p>
        </span>
    </div>

    <div id="green">
        I am another div
    </div>

    <a href="https://google.com">Open Google</a>
    <a href="https://facebook.com">Open Facebook</a>
</body>

</html>
