    <style>

        .outline {
            border: 2px solid black;
            border-radius: 4%;
            height: 50vw;
            width: 50vh;
            position: relative;
            left: 400px;
            box-shadow: 2px 2px 2px gray;

        .image {
            border: 1px solid white;
            border-radius: 4%;

            width: 48vh;

        }

        .capsule {
            padding: 4px;
        }

        span {

            left: 15px;

        }

        p {

            top: 340px;
            left: 10px;
        }

        .rm {
            position: relative;
            top: 370px;
            left: 18vh;
            color: rgb(0, 136, 195);
            border: 0px solid rgb(133, 204, 255);
            border-radius: 15px;
            background-color: rgb(133, 204, 255);
            width: 80px;
            height: 30px;
            text-align: center;
            cursor: pointer;
        }

        .rm:hover {
            background-color: rgb(170, 217, 250);
            color: rgb(235, 244, 251);
        }
    </style>
</head>
