<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Fit and Object Cover</title>
    <style>
        .container{
            height: 30vw;
            width: 40vh;
            border: 2px solid black;
            background-image: url("https://imgs.search.brave.com/_Hf9l4vUroQq5Gks-sFPdFBeNhJzsf_IU5SQ8_ZJjf4/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9jZG4t/ZnJvbnQuZnJlZXBp/ay5jb20vaG9tZS9h/bm9uLXJ2bXAvY3Jl/YXRpdmUtc3VpdGUv/cGhvdG9ncmFwaHkv/cmVpbWFnaW5lLndl/YnA");
            background-position: center center;

            /* If image size is smaller than the area to be filled than image is repeted to fill the gap in X axis and in Y axis and to prevent it ...*/
            background-repeat: no-repeat;
        }
        img{
            height: 30vw;
            width: 40vh;
            object-fit: cover;
            /* object-fit: fill; */ /*(By default value)*/
            /* object-fit: contain; */
            /* object-position: top right;
            object-position: bottom left; */
            object-position: 10px 20px  ;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- <img src="https://imgs.search.brave.com/_Hf9l4vUroQq5Gks-sFPdFBeNhJzsf_IU5SQ8_ZJjf4/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9jZG4t/ZnJvbnQuZnJlZXBp/ay5jb20vaG9tZS9h/bm9uLXJ2bXAvY3Jl/YXRpdmUtc3VpdGUv/cGhvdG9ncmFwaHkv/cmVpbWFnaW5lLndl/YnA" alt=""> -->
    </div>
</body>
</html>
