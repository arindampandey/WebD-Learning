<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Property</title>
    <style>
        .box {
            border: 2px solid black;
            /* display: inline; */
            display: inline-block;
            padding: 20px;
            margin: 25px;
        }

        * {
            margin: 0;
            padding: 0;
        }

        .box1{
            /* display: none; */
            visibility: hidden;
        }
    </style>
</head>

<body>
    <div class="box box1">
        I am a box
    </div>

    <div class="box">Also a box</div>

    <span>I am a good boy</span>
</body>

</html>
