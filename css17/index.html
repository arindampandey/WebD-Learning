<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .container {
            border: 2px solid red;
            display: flex;
            height: 80vh;
            justify-content: center;
            align-items: center;
            /* flex-direction: column;
            flex-direction: row-reverse; */
            /* flex-wrap: wrap; */
            flex-flow: row wrap;
            /* gap: 30px; */
            row-gap: 20px;
            column-gap: 40px;
            /* Above two lines can also be written as ... */
            gap: 20px 40px;
        }

        .item {
            height: 92px;
            width: 92px;
            border: 2px solid black;
            margin: 4px;
            background-color: aquamarine;
            align-content: flex-start;
        }

        .item1 {
            /* flex-grow: 2; */
            flex-shrink: 2;
        }
    </style>
</head>

<body>
    <main>
        <div class="container">
            <div class="item item1"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
        </div>
    </main>
</body>

</html>
