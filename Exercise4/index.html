<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multicolor Website</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    </style>
    <style>
        :root {
            --primary-color: rgba(174, 143, 203, 0.854);
            --text-color: rgba(255, 255, 255, 0.908);
            --secondry-color: rgb(246, 236, 255);
        }
        /* :root {
            --primary-color: rgb(113, 160, 108);
            --text-color: rgba(255, 255, 255, 0.908);
            --secondry-color: rgb(170, 255, 176);
        } */

        body {
            background-color: var(--secondry-color);
        }

        * {
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: var(--primary-color);
            padding: 12px;
        }

        ul li {
            list-style: none;
            display: inline;
            padding: 23px;
            font-family: "Poppins", sans-serif;
            font-weight: 200;
            font-style: normal;
            color: var(--text-color);
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Sevices</li>
                <li>Cantact</li>
            </ul>
        </nav>
    </header>
</body>

</html>
